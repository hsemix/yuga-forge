title: Yuga Forge
description: FilamentPHP-style resource/form/table builder for Yuga admin panels.
remote_theme: just-the-docs/just-the-docs

color_scheme: light
search_enabled: true
nav_sort: case_insensitive

permalink: pretty

aux_links:
  "GitHub":
    - "https://github.com/yuga-yuga/yuga-forge"

aux_links_new_tab: true

footer_content: "Yuga Forge &mdash; MIT License"

# Callout defaults
callouts_level: quiet
callouts:
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green
  warning:
    title: Warning
    color: yellow
